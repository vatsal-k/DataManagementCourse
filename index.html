<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Management Mastery - 10 Day Course</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --primary: #1e40af;
            --secondary: #0f766e;
            --accent: #dc2626;
            --light-bg: #f8fafc;
            --dark-bg: #0f172a;
            --card-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --success: #059669;
            --warning: #d97706;
            --gradient-1: linear-gradient(135deg, #1e40af 0%, #0f766e 100%);
            --gradient-2: linear-gradient(135deg, #0f766e 0%, #0891b2 100%);
            --shadow: 0 20px 60px rgba(15, 23, 42, 0.1);
            --shadow-sm: 0 4px 12px rgba(15, 23, 42, 0.08);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Header */
        header {
            background: var(--gradient-1);
            color: white;
            padding: 3rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 1;
            animation: slideInDown 0.8s ease-out;
            letter-spacing: -1px;
        }

        header p {
            font-size: 1.2rem;
            opacity: 0.95;
            position: relative;
            z-index: 1;
            animation: slideInUp 0.8s ease-out 0.2s backwards;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .header-stats {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-top: 2rem;
            position: relative;
            z-index: 1;
        }

        .stat {
            text-align: center;
            animation: fadeInUp 0.8s ease-out 0.4s backwards;
        }

        .stat-number {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            display: block;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.85;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        /* Course Grid */
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }

        /* Day Card */
        .day-card {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            position: relative;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            animation: fadeInUp 0.6s ease-out backwards;
        }

        .day-card:nth-child(1) { animation-delay: 0.1s; }
        .day-card:nth-child(2) { animation-delay: 0.2s; }
        .day-card:nth-child(3) { animation-delay: 0.3s; }
        .day-card:nth-child(4) { animation-delay: 0.4s; }
        .day-card:nth-child(5) { animation-delay: 0.5s; }
        .day-card:nth-child(6) { animation-delay: 0.6s; }
        .day-card:nth-child(7) { animation-delay: 0.1s; }
        .day-card:nth-child(8) { animation-delay: 0.2s; }
        .day-card:nth-child(9) { animation-delay: 0.3s; }
        .day-card:nth-child(10) { animation-delay: 0.4s; }

        .day-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-1);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.5s ease-out;
        }

        .day-card:hover::before {
            transform: scaleX(1);
        }

        .day-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 60px rgba(15, 23, 42, 0.15);
            border-color: var(--primary);
        }

        .day-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: var(--gradient-1);
            color: white;
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            box-shadow: 0 4px 12px rgba(30, 64, 175, 0.3);
        }

        .day-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: var(--text-primary);
            line-height: 1.3;
        }

        .day-subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .day-meta {
            display: flex;
            gap: 1.5rem;
            margin: 1.5rem 0;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
        }

        .meta-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--primary);
            opacity: 0.2;
        }

        .topics-list {
            list-style: none;
            margin: 1.5rem 0;
        }

        .topics-list li {
            padding: 0.5rem 0;
            padding-left: 1.5rem;
            position: relative;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .topics-list li::before {
            content: '▸';
            position: absolute;
            left: 0;
            color: var(--primary);
            font-weight: bold;
        }

        .expand-btn {
            margin-top: 1.5rem;
            padding: 0.75rem 1.5rem;
            background: var(--gradient-1);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .expand-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(30, 64, 175, 0.3);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            backdrop-filter: blur(4px);
            animation: fadeIn 0.3s ease-out;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 800px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 3rem;
            position: relative;
            box-shadow: 0 50px 100px rgba(15, 23, 42, 0.2);
            animation: slideInUp 0.4s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2rem;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            color: var(--accent);
            transform: rotate(90deg);
        }

        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 800;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }

        .modal-meta {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .modal-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .modal-info strong {
            color: var(--primary);
        }

        .content-section {
            margin-bottom: 2.5rem;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--primary);
            padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--gradient-1);
        }

        .section-content {
            color: var(--text-secondary);
            line-height: 1.8;
            font-size: 0.95rem;
        }

        .highlight {
            background: linear-gradient(120deg, rgba(30, 64, 175, 0.1) 0%, rgba(15, 118, 110, 0.1) 100%);
            padding: 1.5rem;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
            margin: 1.5rem 0;
        }

        .key-points {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin: 1.5rem 0;
        }

        .key-point {
            background: var(--light-bg);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .key-point:hover {
            border-color: var(--primary);
            box-shadow: 0 8px 20px rgba(30, 64, 175, 0.1);
            transform: translateY(-4px);
        }

        .key-point-title {
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
        }

        .key-point-content {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .code-block {
            background: #1e293b;
            color: #e2e8f0;
            padding: 1.5rem;
            border-radius: 12px;
            overflow-x: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            margin: 1.5rem 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Footer */
        footer {
            background: var(--dark-bg);
            color: white;
            text-align: center;
            padding: 3rem 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 4rem;
        }

        footer p {
            opacity: 0.8;
            font-size: 0.95rem;
        }

        /* Animations */
        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--light-bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--secondary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            header h1 {
                font-size: 2.2rem;
            }

            .header-stats {
                gap: 1.5rem;
                flex-wrap: wrap;
            }

            .stat-number {
                font-size: 1.8rem;
            }

            .course-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                padding: 2rem;
                border-radius: 16px;
            }

            .modal-title {
                font-size: 1.8rem;
            }

            .key-points {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Data Management Mastery</h1>
        <p>Master the fundamentals and advanced concepts in 10 days</p>
        <div class="header-stats">
            <div class="stat">
                <span class="stat-number">10</span>
                <span class="stat-label">Days</span>
            </div>
            <div class="stat">
                <span class="stat-number">50+</span>
                <span class="stat-label">Topics</span>
            </div>
            <div class="stat">
                <span class="stat-number">∞</span>
                <span class="stat-label">Knowledge</span>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="course-grid" id="courseGrid"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div>
                    <h2 class="modal-title" id="modalTitle"></h2>
                    <div class="modal-meta">
                        <div class="modal-info">
                            ⏱️ <strong id="readTime">15 min</strong> read
                        </div>
                        <div class="modal-info">
                            📚 <strong id="topicCount">8</strong> topics
                        </div>
                    </div>
                </div>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <footer>
        <p>© 2024 Data Management Mastery Course. Comprehensive training for data professionals.</p>
    </footer>

    <script>
        const courseData = [
            {
                day: 1,
                title: "Data Fundamentals",
                subtitle: "Understanding the core concepts",
                readTime: 15,
                topics: ["Data types", "Data sources", "Data quality", "Metadata basics", "Data lifecycle", "Storage concepts", "Data vs Information", "Structured data"],
                content: `
                    <div class="content-section">
                        <div class="section-title">Introduction to Data</div>
                        <div class="section-content">
                            Data is the raw material of information. At its core, data represents facts, observations, or measurements that have been collected and recorded. Understanding what constitutes data and how it differs from information is fundamental to data management. Data becomes information only when it's processed, organized, and contextualized in a way that provides meaning and insight to users or systems. This distinction is critical because data management focuses on the collection, storage, and maintenance of raw data, while data analysis and business intelligence focus on transforming that data into actionable information.
                        </div>
                    </div>

                    <div class="highlight">
                        <strong>Key Insight:</strong> Data is plural—multiple data points collected become a dataset. The value of data emerges not from individual points, but from patterns, correlations, and relationships discovered through systematic analysis.
                    </div>

                    <div class="content-section">
                        <div class="section-title">Types of Data</div>
                        <div class="section-content">
                            Data comes in various forms, each with unique characteristics and management requirements. <strong>Structured data</strong> follows a predefined format and schema, organized in tables with rows and columns like databases and spreadsheets. It's easily searchable and analyzable but less flexible. <strong>Unstructured data</strong> lacks a predefined format—think text documents, images, videos, and audio files. This type of data is flexible but difficult to process automatically. <strong>Semi-structured data</strong> has some organizational properties but doesn't fit neatly into structured formats; JSON, XML, and log files are common examples. Understanding these distinctions helps data managers choose appropriate storage, processing, and retrieval strategies.
                        </div>
                    </div>

                    <div class="key-points">
                        <div class="key-point">
                            <div class="key-point-title">Structured Data</div>
                            <div class="key-point-content">Databases, spreadsheets, CRM systems. Highly organized, schema-driven, easily indexed and searched.</div>
                        </div>
                        <div class="key-point">
                            <div class="key-point-title">Unstructured Data</div>
                            <div class="key-point-content">Images, videos, text, documents. Requires specialized tools for extraction and analysis.</div>
                        </div>
                        <div class="key-point">
                            <div class="key-point-title">Semi-Structured Data</div>
                            <div class="key-point-content">JSON, XML, logs. Flexible schema with some organizational hierarchy.</div>
                        </div>
                        <div class="key-point">
                            <div class="key-point-title">Big Data</div>
                            <div class="key-point-content">High volume, velocity, and variety. Requires distributed processing frameworks.</div>
                        </div>
                    </div>

                    <div class="content-section">
                        <div class="section-title">Data Sources and Quality</div>
                        <div class="section-content">
                            Data originates from numerous sources: transactional systems, sensors, user interactions, APIs, third-party providers, and more. The quality of your data directly impacts the quality of insights you can derive. Data quality encompasses several dimensions: accuracy (data represents true values), completeness (no missing values), consistency (uniform formats across datasets), timeliness (current and up-to-date), and validity (conforms to required formats). Poor data quality can lead to incorrect business decisions, system failures, and wasted resources. Implementing data quality checks at the point of entry and maintaining them throughout the data lifecycle is essential for data management success.
                        </div>
                    </div>

                    <div class="content-section">
                        <div class="section-title">Metadata: Data About Data</div>
                        <div class="section-content">
                            Metadata provides context for your data. It describes the characteristics, properties, and relationships of data. Examples include field names, data types, descriptions, ownership information, creation dates, and version numbers. Maintaining comprehensive metadata is crucial for data discoverability, lineage tracking, and governance. Without metadata, teams waste time understanding what data exists, where it lives, and how it can be used safely.
                        </div>
                    </div>

                    <div class="highlight">
                        <strong>Remember:</strong> Metadata is as important as the data itself. A well-catalogued dataset with poor metadata is nearly useless; a small dataset with excellent metadata becomes a valuable asset.
                    </div>
                `
            },
            {
                day: 2,
                title: "Data Architecture & Design",
                subtitle: "Building the foundation",
                readTime: 15,
                topics: ["Database design", "ER diagrams", "Normalization", "Schemas", "Data warehouses", "Data lakes", "OLTP vs OLAP", "System design"],
                content: `
                    <div class="content-section">
                        <div class="section-title">Data Architecture Overview</div>
                        <div class="section-content">
                            Data architecture is the blueprint for how data flows through an organization. It encompasses the systems, platforms, processes, and frameworks used to collect, store, process, and deliver data. A well-designed architecture ensures data accessibility, security, scalability, and performance. It must balance competing requirements: speed vs. accuracy, flexibility vs. consistency, and cost vs. capability. Enterprise data architectures typically include operational systems (transactional databases), analytical systems (data warehouses and lakes), integration platforms, and analytics tools all working in concert.
                        </div>
                    </div>

                    <div class="content-section">
                        <div class="section-title">Database Design Fundamentals</div>
                        <div class="section-content">
                            Proper database design is fundamental to data management. Entity-Relationship (ER) modeling helps visualize data structure by identifying entities (things you want to store data about), their attributes (properties), and relationships between them. Normalization is the process of organizing database schema to reduce redundancy and improve data integrity. There are multiple normal forms (1NF through 3NF being most common), each with specific rules about how data should be organized. While normalization reduces redundancy, sometimes controlled denormalization is used to improve query performance. The choice between normalization levels depends on your specific use case—transactional systems typically need higher normalization, while analytical systems may accept more redundancy for faster queries.
                        </div>
                    </div>

                    <div class="key-points">
                        <div class="key-point">
                            <div class="key-point-title">First Normal Form (1NF)</div>
                            <div class="key-point-content">Eliminate repeating groups. Each field contains atomic (indivisible) values.</div>
                        </div>
                        <div class="key-point">
                            <div class="key-point-title">Second Normal Form (2NF)</div>
                            <div class="key-point-content">Remove partial dependencies. Non-key attributes must depend on entire primary key.</div>
                        </div>
                        <div class="key-point">
                            <div class="key-point-title">Third Normal Form (3NF)</div>
                            <div class="key-point-content">Remove transitive dependencies. Non-key attributes depend only on primary key.</div>
                        </div>
                        <div class="key-point">
                            <div class="key-point-title">Denormalization</div>
                            <div class="key-point-content">Controlled redundancy for performance, common in analytics and data warehouses.</div>
                        </div>
                    </div>

                    <div class="content-section">
                        <div class="section-title">Data Warehouses vs Data Lakes</div>
                        <div class="section-content">
                            A <strong>data warehouse</strong> is a structured, integrated repository optimized for analytical queries. Data is extracted from operational systems, transformed to conform to a schema, and loaded into the warehouse. This ETL process ensures consistency and quality, making data warehouses reliable for critical business reporting. However, this process can be time-consuming and inflexible. A <strong>data lake</strong> is a larger repository that stores raw data in native formats without predefined structure. Data lakes offer flexibility and can accommodate diverse data types, but require strong governance to prevent becoming "data swamps" where data quality and lineage are unclear. Modern architectures often combine both: a data lake for raw data storage and exploration, with data marts (smaller warehouses) for specific business functions.
                        </div>
                    </div>

                    <div class="highlight">
                        <strong>OLTP vs OLAP:</strong> OLTP (Online Transaction Processing) systems are optimized for frequent, small updates—think banking transactions. OLAP (Online Analytical Processing) systems are optimized for complex queries over large datasets—think business intelligence. These require different architectural approaches.
                    </div>
                `
            },
            {
                day: 3,
                title: "Data Integration & ETL",
                subtitle: "Moving data efficiently",
                readTime: 15,
                topics: ["ETL processes", "Data pipelines", "Data transformation", "API integration", "Data validation", "Error handling", "Scheduling", "Data matching"],
                content: `
                    <div class="content-section">
                        <div class="section-title">Understanding ETL</div>
                        <div class="section-content">
                            ETL stands for Extract, Transform, Load. It's the process of moving data from source systems into a target system (typically a data warehouse or lake). <strong>Extract</strong> involves reading data from various source systems—databases, APIs, files, web services, etc. This must be done in a way that doesn't disrupt operational systems. <strong>Transform</strong> involves cleaning, validating, enriching, and reshaping data to meet business requirements and ensure consistency. Transformations might include standardizing date formats, converting currencies, removing duplicates, or calculating new fields. <strong>Load</strong> involves moving the processed data into the target system. Modern ETL tools have evolved to support streaming and incremental loads rather than just batch processing, allowing for near-real-time data availability.
                        </div>
                    </div>

                    <div class="highlight">
                        <strong>ELT Alternative:</strong> Extract, Load, Transform (ELT) is an emerging pattern where raw data is loaded first, then transformed in the target system. This approach leverages powerful cloud computing resources and is more flexible, though it requires robust data lake governance.
                    </div>

                    <div class="content-section">
                        <div class="section-title">Data Transformation Techniques</div>
                        <div class="section-content">
                            Transformation is where raw data becomes valuable. Common transformations include data cleaning (handling nulls, outliers, inconsistencies), standardization (consistent formats, units, naming conventions), enrichment (adding external data), aggregation (summarizing data), and joining (combining data from multiple sources). Mapping transformation rules ensures consistency across your organization. For example, standardizing customer names, converting all currencies to a single denomination, or parsing complex nested data structures. The complexity of transformations depends on data quality at the source—poor source data quality means more transformation effort is needed downstream.
                        </div>

                grid.appendChild(card);
            });
        }

        function openModal(index) {
            const day = courseData[index];
            document.getElementById('modalTitle').textContent = `Day ${day.day}: ${day.title}`;
            document.getElementById('readTime').textContent = `${day.readTime} min`;
            document.getElementById('topicCount').textContent = day.topics.length;
            document.getElementById('modalBody').innerHTML = day.content;
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        renderCourse();
    </script>
</body>
</html>
